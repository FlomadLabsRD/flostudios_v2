<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FloStudios.ai — Creative learning, built at flight speed</title>
  <link rel="stylesheet" href="assets/svi-tokens.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#3B82F6",
      "showTicker": true,
      "showGrid": true,
      "heroSize": 1.0,
      "showWorkBento": true
    }/*EDITMODE-END*/;

    function App() {
      const [active, setActive] = useState("top");
      const [showApply, setShowApply] = useState(false);
      const [toast, setToast] = useState(null);
      const t = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        const ids = ["top", "work", "services", "frequency", "products", "ecosystem"];
        const io = new IntersectionObserver((entries) => {
          // pick the entry closest to top of viewport that's intersecting
          let best = null;
          entries.forEach(e => {
            if (e.isIntersecting) {
              if (!best || e.boundingClientRect.top < best.boundingClientRect.top) best = e;
            }
          });
          if (best) setActive(best.target.id);
        }, { rootMargin: "-40% 0px -55% 0px", threshold: 0 });
        ids.forEach(id => { const el = document.getElementById(id); if (el) io.observe(el); });
        return () => io.disconnect();
      }, []);

      useEffect(() => {
        if (!toast) return;
        const x = setTimeout(() => setToast(null), 2600);
        return () => clearTimeout(x);
      }, [toast]);

      // apply tweaks live via CSS vars
      useEffect(() => {
        document.documentElement.style.setProperty("--svi-accent", t.accent);
        document.documentElement.style.setProperty("--svi-blue-400", t.accent);
      }, [t.accent]);

      const navTo = (id) => {
        setActive(id);
        const el = document.getElementById(id);
        if (!el) return;
        const top = el.getBoundingClientRect().top + window.pageYOffset - 64;
        window.scrollTo({ top, behavior: "smooth" });
      };

      const openApply = () => setShowApply(true);
      const onApplied = () => setToast("// Application transmitted · channel locked");

      return (
        <div className="page-wrap" data-screen-label="01 Home">
          {t.showGrid && <div className="page-grid" />}
          <FloNav active={active} onNav={navTo} onApply={openApply} />
          <FloHero onApply={openApply} onNav={navTo} />
          <FloStats />
          <FloWork onApply={openApply} />
          <FloServices />
          <FloFrequency onApply={openApply} />
          <FloProducts />
          <FloEcosystem />
          <FloCTA onApply={openApply} />
          <FloFooter />

          {showApply && <FloApplyModal onClose={() => setShowApply(false)} onSubmit={onApplied} />}
          {toast && <div className="flo-toast">{toast}</div>}

          <TweaksPanel title="Tweaks">
            <TweakSection title="Accent">
              <TweakColor
                t={t} k="accent"
                options={["#3B82F6", "#00B7FF", "#7C8CFF", "#F59E0B", "#22D3EE"]}
              />
            </TweakSection>
            <TweakSection title="Hero">
              <TweakToggle t={t} k="showTicker" label="Show live ticker" />
              <TweakToggle t={t} k="showGrid" label="Background grid" />
            </TweakSection>
          </TweaksPanel>

          {!t.showTicker && (
            <style>{`.flo-ticker { display: none; }`}</style>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
